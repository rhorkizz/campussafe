<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --upsa-navy: #0A1628;
    --upsa-blue: #1B3A6B;
    --upsa-accent: #E8A020;
    --upsa-green: #2ECC71;
    --upsa-red: #E74C3C;
    --upsa-teal: #1ABC9C;
    --upsa-light: #F4F7FB;
    --upsa-card: #FFFFFF;
    --upsa-border: #E2E8F0;
    --upsa-text: #1A2332;
    --upsa-muted: #7A8BA0;
    --sidebar-w: 260px;
    --topbar-h: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--upsa-light);
    color: var(--upsa-text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== AUTH SCREEN ===== */
  #auth-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, var(--upsa-navy) 0%, var(--upsa-blue) 60%, #2A5298 100%);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }

  .auth-bg-pattern {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at 20% 80%, rgba(232,160,32,0.08) 0%, transparent 50%),
                      radial-gradient(circle at 80% 20%, rgba(30,136,229,0.1) 0%, transparent 50%);
  }

  .auth-box {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 48px 44px;
    width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4);
  }

  .auth-logo {
    display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
  }

  .auth-logo-icon {
    width: 48px; height: 48px;
    background: var(--upsa-accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .auth-logo-text h1 { font-size: 18px; font-weight: 700; color: #fff; line-height: 1.2; }
  .auth-logo-text p { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 400; letter-spacing: 0.05em; }

  .auth-title { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .auth-subtitle { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 32px; }

  .role-selector {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 24px;
  }

  .role-btn {
    padding: 10px 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
    border-radius: 10px;
    font-size: 11px; font-weight: 600; font-family: 'Sora', sans-serif;
    cursor: pointer; transition: all 0.2s;
    text-align: center;
  }

  .role-btn.active {
    background: var(--upsa-accent);
    border-color: var(--upsa-accent);
    color: var(--upsa-navy);
  }

  .auth-input {
    width: 100%; padding: 13px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: #fff; font-family: 'Sora', sans-serif; font-size: 14px;
    margin-bottom: 12px; outline: none; transition: border-color 0.2s;
  }

  .auth-input::placeholder { color: rgba(255,255,255,0.35); }
  .auth-input:focus { border-color: var(--upsa-accent); }

  .auth-btn {
    width: 100%; padding: 14px;
    background: var(--upsa-accent);
    color: var(--upsa-navy);
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; font-family: 'Sora', sans-serif;
    cursor: pointer; margin-top: 8px;
    transition: all 0.2s;
  }

  .auth-btn:hover { background: #F0B030; transform: translateY(-1px); }

  /* ===== MAIN APP ===== */
  #app { display: none; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--upsa-navy);
    display: flex; flex-direction: column;
    z-index: 100;
  }

  .sidebar-logo {
    padding: 20px 20px 16px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .sidebar-logo-icon {
    width: 36px; height: 36px;
    background: var(--upsa-accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }

  .sidebar-logo-text { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.3; }
  .sidebar-logo-sub { font-size: 10px; color: rgba(255,255,255,0.4); }

  .sidebar-user {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .sidebar-user-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .badge-student { background: rgba(46,204,113,0.2); color: #2ECC71; }
  .badge-admin { background: rgba(232,160,32,0.2); color: var(--upsa-accent); }
  .badge-security { background: rgba(231,76,60,0.2); color: #E74C3C; }

  .sidebar-user-name { font-size: 13px; font-weight: 600; color: #fff; }
  .sidebar-user-id { font-size: 11px; color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; }

  .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }

  .nav-section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.3); padding: 8px 8px 4px;
    text-transform: uppercase;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500;
    cursor: pointer; margin-bottom: 2px; transition: all 0.2s;
    border: none; background: none; width: 100%; text-align: left;
  }

  .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .nav-item.active { background: var(--upsa-accent); color: var(--upsa-navy); font-weight: 600; }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

  .nav-badge {
    margin-left: auto;
    background: var(--upsa-red);
    color: #fff; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px;
  }

  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .logout-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    color: rgba(255,255,255,0.5); font-size: 13px;
    cursor: pointer; width: 100%; border: none; background: none;
    font-family: 'Sora', sans-serif; transition: all 0.2s;
  }

  .logout-btn:hover { background: rgba(231,76,60,0.15); color: #E74C3C; }

  /* Topbar */
  .topbar {
    position: fixed; left: var(--sidebar-w); right: 0; top: 0;
    height: var(--topbar-h);
    background: var(--upsa-card);
    border-bottom: 1px solid var(--upsa-border);
    display: flex; align-items: center; padding: 0 28px;
    z-index: 50; gap: 16px;
  }

  .topbar-title { font-size: 18px; font-weight: 700; flex: 1; }
  .topbar-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--upsa-light); border: 1px solid var(--upsa-border);
    border-radius: 10px; padding: 8px 14px; width: 240px;
  }

  .topbar-search input {
    border: none; background: none; font-family: 'Sora', sans-serif;
    font-size: 13px; outline: none; color: var(--upsa-text); width: 100%;
  }

  .topbar-notif {
    position: relative; cursor: pointer;
    width: 36px; height: 36px;
    background: var(--upsa-light); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .notif-dot {
    position: absolute; top: 6px; right: 6px;
    width: 8px; height: 8px;
    background: var(--upsa-red); border-radius: 50%;
    border: 2px solid var(--upsa-card);
  }

  /* Main content */
  .main-content {
    margin-left: var(--sidebar-w);
    margin-top: var(--topbar-h);
    padding: 28px;
    min-height: calc(100vh - var(--topbar-h));
  }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Cards */
  .card {
    background: var(--upsa-card);
    border-radius: 16px;
    border: 1px solid var(--upsa-border);
    padding: 24px;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 15px; font-weight: 700; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Stats grid */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }

  .stat-card {
    background: var(--upsa-card);
    border-radius: 16px;
    border: 1px solid var(--upsa-border);
    padding: 20px 22px;
    position: relative; overflow: hidden;
  }

  .stat-card::before {
    content: ''; position: absolute;
    right: -10px; top: -10px;
    width: 80px; height: 80px;
    border-radius: 50%;
    opacity: 0.07;
  }

  .stat-card.blue::before { background: var(--upsa-blue); }
  .stat-card.green::before { background: var(--upsa-green); }
  .stat-card.orange::before { background: var(--upsa-accent); }
  .stat-card.red::before { background: var(--upsa-red); }

  .stat-icon { font-size: 24px; margin-bottom: 12px; }
  .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--upsa-muted); font-weight: 500; }
  .stat-change { font-size: 11px; margin-top: 6px; font-weight: 600; }
  .stat-change.up { color: var(--upsa-green); }
  .stat-change.down { color: var(--upsa-red); }

  /* Charts row */
  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; font-weight: 600; color: var(--upsa-muted); text-transform: uppercase;
       letter-spacing: 0.05em; padding: 10px 14px; text-align: left;
       border-bottom: 1px solid var(--upsa-border); }
  td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid #F1F5F9; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FAFBFD; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }

  .status-pending { background: rgba(232,160,32,0.12); color: #D4920A; }
  .status-inprogress { background: rgba(27,58,107,0.1); color: var(--upsa-blue); }
  .status-resolved { background: rgba(46,204,113,0.12); color: #27AE60; }
  .status-escalated { background: rgba(231,76,60,0.12); color: var(--upsa-red); }

  .priority-badge {
    display: inline-block; padding: 3px 8px; border-radius: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.03em;
  }

  .priority-high { background: rgba(231,76,60,0.12); color: var(--upsa-red); }
  .priority-medium { background: rgba(232,160,32,0.12); color: #D4920A; }
  .priority-low { background: rgba(46,204,113,0.12); color: #27AE60; }

  /* Form styles */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { margin-bottom: 18px; }
  .form-group.full { grid-column: 1 / -1; }

  label { display: block; font-size: 12px; font-weight: 600; color: var(--upsa-muted);
          margin-bottom: 7px; letter-spacing: 0.03em; text-transform: uppercase; }

  input[type="text"], input[type="email"], input[type="date"], select, textarea {
    width: 100%; padding: 11px 14px;
    background: var(--upsa-light);
    border: 1.5px solid var(--upsa-border);
    border-radius: 10px; font-family: 'Sora', sans-serif; font-size: 13.5px;
    color: var(--upsa-text); outline: none; transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--upsa-blue); background: #fff; }
  textarea { resize: vertical; min-height: 100px; }

  .file-drop {
    border: 2px dashed var(--upsa-border);
    border-radius: 12px; padding: 32px;
    text-align: center; cursor: pointer; transition: all 0.2s;
    background: var(--upsa-light);
  }

  .file-drop:hover { border-color: var(--upsa-blue); background: #EEF2FF; }
  .file-drop-icon { font-size: 32px; margin-bottom: 10px; }
  .file-drop p { font-size: 13px; color: var(--upsa-muted); }
  .file-drop strong { color: var(--upsa-blue); }

  .btn {
    padding: 11px 22px; border-radius: 10px;
    font-size: 13.5px; font-weight: 600; font-family: 'Sora', sans-serif;
    cursor: pointer; transition: all 0.2s; border: none;
  }

  .btn-primary { background: var(--upsa-blue); color: #fff; }
  .btn-primary:hover { background: #142E5A; transform: translateY(-1px); }
  .btn-accent { background: var(--upsa-accent); color: var(--upsa-navy); }
  .btn-accent:hover { background: #F0B030; }
  .btn-outline { background: none; border: 1.5px solid var(--upsa-border); color: var(--upsa-text); }
  .btn-outline:hover { border-color: var(--upsa-blue); color: var(--upsa-blue); }
  .btn-danger { background: var(--upsa-red); color: #fff; }
  .btn-success { background: var(--upsa-green); color: #fff; }

  /* Timeline */
  .timeline { padding: 8px 0; }
  .timeline-item { display: flex; gap: 14px; margin-bottom: 20px; }
  .timeline-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .timeline-line { width: 1px; background: var(--upsa-border); margin: 14px auto 0; height: calc(100% - 14px); }
  .timeline-text { font-size: 13px; line-height: 1.5; }
  .timeline-time { font-size: 11px; color: var(--upsa-muted); font-family: 'DM Mono', monospace; }

  /* Progress */
  .progress-bar { height: 6px; background: var(--upsa-border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

  /* Alert */
  .alert {
    padding: 14px 16px; border-radius: 12px;
    font-size: 13px; font-weight: 500; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }

  .alert-success { background: rgba(46,204,113,0.1); color: #27AE60; border: 1px solid rgba(46,204,113,0.2); }
  .alert-warning { background: rgba(232,160,32,0.1); color: #D4920A; border: 1px solid rgba(232,160,32,0.2); }

  /* Map-like location picker */
  .location-map {
    background: linear-gradient(135deg, #EEF2FF 0%, #E8F4FD 100%);
    border: 1.5px solid var(--upsa-border);
    border-radius: 12px; padding: 20px;
    text-align: center; cursor: pointer;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(10,22,40,0.6);
    display: none; align-items: center; justify-content: center; z-index: 500;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--upsa-card); border-radius: 20px;
    padding: 32px; width: 560px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.25);
  }

  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--upsa-muted); margin-bottom: 24px; }

  /* Incident ID badge */
  .incident-id {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    background: var(--upsa-light); color: var(--upsa-muted);
    padding: 3px 8px; border-radius: 6px;
  }

  /* Action buttons row */
  .action-row { display: flex; gap: 10px; flex-wrap: wrap; }

  /* Incident card for student view */
  .incident-card {
    background: var(--upsa-card);
    border: 1px solid var(--upsa-border);
    border-radius: 14px; padding: 18px 20px;
    margin-bottom: 12px; cursor: pointer;
    transition: all 0.2s; display: flex; gap: 16px; align-items: flex-start;
  }

  .incident-card:hover { border-color: var(--upsa-blue); box-shadow: 0 4px 16px rgba(27,58,107,0.1); }

  .incident-type-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  .type-theft { background: rgba(231,76,60,0.1); }
  .type-maintenance { background: rgba(232,160,32,0.1); }
  .type-safety { background: rgba(27,58,107,0.1); }
  .type-harassment { background: rgba(155,89,182,0.1); }
  .type-other { background: rgba(46,204,113,0.1); }

  /* Responsive tweaks */
  @media (max-width: 1100px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
  }

  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }

  .page-header h2 { font-size: 22px; font-weight: 700; }
  .page-header p { font-size: 13px; color: var(--upsa-muted); margin-top: 2px; }

  .divider { height: 1px; background: var(--upsa-border); margin: 20px 0; }

  .text-muted { color: var(--upsa-muted); font-size: 13px; }
  .text-sm { font-size: 12px; }
  .fw-600 { font-weight: 600; }
  .mt-8 { margin-top: 8px; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .ml-auto { margin-left: auto; }

  /* ===== MOBILE HAMBURGER BUTTON ===== */
  .hamburger {
    display: none;
    flex-direction: column; justify-content: center; align-items: center;
    gap: 5px; width: 36px; height: 36px;
    background: var(--upsa-light); border: 1px solid var(--upsa-border);
    border-radius: 10px; cursor: pointer; flex-shrink: 0;
  }
  .hamburger span {
    display: block; width: 18px; height: 2px;
    background: var(--upsa-text); border-radius: 2px;
    transition: all 0.3s;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ===== SIDEBAR OVERLAY (mobile) ===== */
  .sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 99;
    backdrop-filter: blur(2px);
  }
  .sidebar-overlay.active { display: block; }

  /* ===== RESPONSIVE BREAKPOINTS ===== */

  /* Tablet (768px – 1024px): collapse sidebar to icon rail */
  @media (max-width: 1024px) {
    :root { --sidebar-w: 72px; }
    .sidebar-logo-text, .sidebar-logo-sub,
    .sidebar-user, .nav-section-label,
    .nav-item span:last-child, .nav-badge,
    .logout-btn span:last-child { display: none; }
    .sidebar-logo { justify-content: center; padding: 16px 8px; }
    .sidebar-logo-icon { width: 40px; height: 40px; font-size: 18px; }
    .nav-item { justify-content: center; padding: 12px; }
    .nav-item .icon { width: auto; font-size: 20px; }
    .logout-btn { justify-content: center; }
    .topbar { padding: 0 16px; }
    .topbar-search { width: 180px; }
  }

  /* Mobile (≤768px): full sidebar as slide-in drawer */
  @media (max-width: 768px) {
    :root { --sidebar-w: 260px; --topbar-h: 56px; }

    /* Sidebar becomes off-canvas drawer */
    .sidebar {
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      z-index: 200;
    }
    .sidebar.open { transform: translateX(0); }

    /* Restore hidden sidebar text on mobile drawer */
    .sidebar-logo-text, .sidebar-logo-sub,
    .sidebar-user, .nav-section-label,
    .nav-badge, .logout-btn span { display: block !important; }
    .nav-item span:last-child { display: inline !important; }
    .sidebar-logo { justify-content: flex-start; padding: 20px 20px 16px; }
    .sidebar-logo-icon { width: 36px; height: 36px; font-size: 16px; }
    .nav-item { justify-content: flex-start; padding: 10px 12px; }
    .nav-item .icon { font-size: 16px; width: 20px; }
    .logout-btn { justify-content: flex-start; }

    /* Topbar: full width, show hamburger */
    .topbar { left: 0; padding: 0 16px; gap: 12px; }
    .topbar-title { font-size: 15px; }
    .topbar-search { display: none; }
    .hamburger { display: flex; }

    /* Main content: no left margin */
    .main-content { margin-left: 0; padding: 16px; }

    /* Stats grid: 1 column on small phones */
    .stats-grid { grid-template-columns: 1fr 1fr !important; gap: 12px; }
    .charts-row { grid-template-columns: 1fr !important; }

    /* Auth box: full width on mobile */
    .auth-box { width: 92vw; padding: 32px 24px; border-radius: 18px; }
    .auth-title { font-size: 22px; }

    /* Modals: full screen on mobile */
    .modal-content { width: 95vw; padding: 24px 20px; max-height: 90vh; border-radius: 16px; }

    /* Tables: horizontal scroll */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { min-width: 560px; }

    /* Toast: bottom center on mobile */
    #toast { left: 16px; right: 16px; bottom: 16px; border-radius: 12px; }

    /* Cards full width */
    .card { border-radius: 14px; }

    /* Page header stacked */
    .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .page-header .ml-auto { margin-left: 0; width: 100%; }
    .page-header .ml-auto .btn { width: 100%; justify-content: center; }
  }

  /* Very small phones */
  @media (max-width: 400px) {
    .stats-grid { grid-template-columns: 1fr !important; }
    .role-selector { grid-template-columns: 1fr !important; }
  }

  /* Fade in */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel.active { animation: fadeInUp 0.3s ease; }

  /* Notification toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    background: var(--upsa-navy); color: #fff;
    padding: 14px 20px; border-radius: 12px;
    font-size: 13.5px; font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s; display: flex; align-items: center; gap: 10px;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
</style>

// ===== BUILD APP =====
function buildApp() {
  const cfg = roleConfig[currentRole];
  document.getElementById('role-badge').textContent = cfg.badge;
  document.getElementById('role-badge').className = 'sidebar-user-badge ' + cfg.badgeClass;
  document.getElementById('user-name').textContent = cfg.name;
  document.getElementById('user-id').textContent = 'ID: ' + cfg.id;

  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = `<div class="nav-section-label">Navigation</div>` +
    cfg.nav.map((n, i) => `
      <button class="nav-item ${i === 0 ? 'active' : ''}" onclick="navigate('${n.panel}', this)">
        <span class="icon">${n.icon}</span> ${n.label}
        ${n.badge ? `<span class="nav-badge">${n.badge}</span>` : ''}
      </button>`).join('');

  navigate(cfg.nav[0].panel, nav.querySelector('.nav-item'));
}

function navigate(panel, el) {
  closeSidebar();
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');

  const labels = {
    'student-dashboard': 'Dashboard', 'report-form': 'Report an Incident',
    'my-reports': 'My Reports', 'track-status': 'Track Status',
    'admin-dashboard': 'Admin Overview', 'all-incidents': 'All Incidents',
    'users': 'User Management', 'analytics': 'Analytics',
    'security-dashboard': 'Active Cases', 'assignments': 'My Assignments',
    'sec-all-reports': 'All Reports', 'update-case': 'Update Case',
  };

  document.getElementById('topbar-title').textContent = labels[panel] || panel;
  currentPanel = panel;

  const content = document.getElementById('main-content');

  // Destroy old charts
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};

  const renders = {
    'student-dashboard': renderStudentDashboard,
    'report-form': renderReportForm,
    'my-reports': renderMyReports,
    'track-status': renderTrackStatus,
    'admin-dashboard': renderAdminDashboard,
    'all-incidents': renderAllIncidents,
    'users': renderUsers,
    'analytics': renderAnalytics,
    'security-dashboard': renderSecurityDashboard,
    'assignments': renderAssignments,
    'sec-all-reports': renderSecAllReports,
    'update-case': renderUpdateCase,
  };

  content.innerHTML = renders[panel] ? renders[panel]() : `<div class="card"><p>Coming soon.</p></div>`;

  // Post-render charts
  setTimeout(() => {
    if (panel === 'student-dashboard') initStudentCharts();
    if (panel === 'admin-dashboard') initAdminCharts();
    if (panel === 'analytics') initAnalyticsCharts();
    if (panel === 'security-dashboard') initSecurityCharts();
  }, 50);
}

// ===== MODAL =====
function openIncidentModal(id) {
  const i = incidents.find(x => x.id === id);
  if (!i) return;
  const modal = document.createElement('div');
  modal.className = 'modal-overlay open';
  modal.innerHTML = `
  <div class="modal">
    <div class="flex items-center gap-8" style="margin-bottom:4px">
      <span class="incident-id">${i.id}</span>${statusBadge(i.status)}${priorityBadge(i.priority)}
      <span class="ml-auto" style="cursor:pointer;font-size:20px;color:var(--upsa-muted)" onclick="this.closest('.modal-overlay').remove()">✕</span>
    </div>
    <div class="modal-title" style="margin-top:12px">${i.title}</div>
    <div class="modal-sub">📍 ${i.location} · 📅 ${i.date} · 👤 ${i.reporter}</div>
    <div class="divider"></div>
    <div class="card-title">📝 Description</div>
    <p style="font-size:13.5px;line-height:1.7;color:var(--upsa-text);margin-bottom:20px">${i.desc}</p>
    <div class="divider"></div>
    <div class="card-title">📍 Timeline</div>
    ${i.updates.map(u => `
    <div class="flex gap-12" style="margin-bottom:12px">
      <div style="width:8px;height:8px;border-radius:50%;background:${u.color};margin-top:5px;flex-shrink:0"></div>
      <div><div class="fw-600" style="font-size:13px">${u.text}</div><div class="text-muted text-sm">${u.time}</div></div>
    </div>`).join('')}
    <div class="divider"></div>
    <div class="action-row">
      <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Close</button>
      ${currentRole !== 'student' ? `<button class="btn btn-primary" onclick="showToast('✅ Status updated!');this.closest('.modal-overlay').remove()">Update Status</button>` : ''}
    </div>
  </div>`;
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  document.body.appendChild(modal);
}

function openUpdateModal(id) { openIncidentModal(id); }

// ===== HELPERS =====
function typeIcon(type) {
  const m = { 'Theft':'🔴', 'Maintenance':'🔧', 'Safety':'⚠️', 'Harassment':'🟣', 'Other':'🟢' };
  return m[type.split('/')[0].trim()] || '📋';
}

function statusBadge(s) {
  const m = { pending:'status-pending', inprogress:'status-inprogress', resolved:'status-resolved', escalated:'status-escalated' };
  const t = { pending:'Pending', inprogress:'In Progress', resolved:'Resolved', escalated:'Escalated' };
  return `<span class="status-badge ${m[s]}">● ${t[s]}</span>`;
}

function priorityBadge(p) {
  const m = { high:'priority-high', medium:'priority-medium', low:'priority-low' };
  return `<span class="priority-badge ${m[p]}">${p.toUpperCase()}</span>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
